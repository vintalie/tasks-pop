<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#0f1419" />
    <title>Offline - Tasks POP</title>
    <style>
      * { box-sizing: border-box; }
      body {
        margin: 0;
        min-height: 100vh;
        font-family: system-ui, -apple-system, 'Segoe UI', sans-serif;
        background: #0f1419;
        color: #e7e9ea;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: max(1.5rem, env(safe-area-inset-top)) max(1.5rem, env(safe-area-inset-right)) max(1.5rem, env(safe-area-inset-bottom)) max(1.5rem, env(safe-area-inset-left));
        text-align: center;
      }
      .offline-icon {
        font-size: 4rem;
        margin-bottom: 1rem;
        opacity: 0.8;
      }
      h1 {
        font-size: 1.5rem;
        margin: 0 0 0.5rem;
      }
      p {
        color: #8b98a5;
        margin: 0 0 1.5rem;
        max-width: 280px;
      }
      button {
        padding: 0.6rem 1.25rem;
        background: #0f1419;
        border: 1px solid #38444d;
        color: #e7e9ea;
        border-radius: 8px;
        font-size: 1rem;
        cursor: pointer;
      }
      button:hover {
        border-color: #1d9bf0;
        color: #1d9bf0;
      }
    </style>
  </head>
  <body>
    <div class="offline-icon" aria-hidden="true">📡</div>
    <h1>Você está offline</h1>
    <p>Verifique sua conexão e tente novamente. Os dados salvos localmente serão sincronizados quando você voltar a conectar.</p>
    <button type="button" onclick="window.location.reload()">Tentar novamente</button>
  </body>
</html>
